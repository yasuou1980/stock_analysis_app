name: Daily Stock Analysis Access

on:
  schedule:
    # 毎日 日本時間 8:00 (UTC 23:00) に実行
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  access_process:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App URL
        # URLはご自身のアプリのURLに合わせて変更してください
        run: |
          curl -I https://stockanalysisapp-uevbsu2jua8hhsgevjgspe.streamlit.app/
