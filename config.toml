
# 設定ファイル

[tickers]
# Streamlit アプリのサイドバーに表示する銘柄
default_tickers = ["SOXL", "SOXS", "TQQQ", "FNGG", "TSLL", "NUGT", "SOFI", "CLSK"]

[ticker_classes]
# 商品クラス定義 (シグナルゲートで使用。未記載のティッカーは plain 扱い)
# inverse_lev: インバース型レバレッジETF。構造的減価があるため BUY シグナル禁止
# long_lev:    ロング型レバレッジETF。急落後の反発が大きいため SELL シグナルを制限
inverse_lev = ["SOXS", "SQQQ", "SPXS"]
long_lev = ["SOXL", "TQQQ", "UPRO", "TECL", "TSLL", "NUGT", "FNGG"]

[batch]
# バッチ実行で分析する銘柄リスト (Streamlit アプリとは独立して管理)
tickers = [
  # --- 半導体・ハイテク ---
  "NVDA", "AMD", "TSM", "INTC", "AVGO", "QCOM", "MU", "AMAT",
  # --- 主要テック ---
  "AAPL", "MSFT", "GOOGL", "META", "AMZN",
  # --- レバレッジ ETF (半導体) ---
  "SOXL", "SOXS",
  # --- レバレッジ ETF (ナスダック・S&P) ---
  "TQQQ", "SQQQ", "UPRO", "SPXS",
  # --- テーマ型 ETF ---
  "FNGG", "TECL", "TSLL", "NUGT",
  # --- 個別グロース ---
  "SOFI", "CLSK", "MSTR", "COIN",
  # --- 主要インデックス ETF ---
  "SPY", "QQQ", "IWM",
]
# 分析に使う過去データの日数
lookback_days = 365
# 結果を保存するディレクトリ (batch_runner.py からの相対パス)
results_dir = "results"
